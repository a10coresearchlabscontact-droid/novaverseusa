<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaVerse USA</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

/* DESKTOP */

.desktop-image{
    display:block;
    width:100vw;
    height:100vh;
    object-fit:contain;
}

/* MOBILE */

.mobile-image{
    display:none;
    width:100vw;
    height:100vh;
    object-fit:contain;
}

/* RESPONSIVE */

@media (max-width:768px){

    .desktop-image{
        display:none;
    }

    .mobile-image{
        display:block;
    }

}

</style>

</head>

<body>

<img
class="desktop-image"
src="NOVAVERSE_APP_HERO_BACKGROUND_V02_COMING_SOON.png"
alt="NovaVerse USA Desktop">

<img
class="mobile-image"
src="NOVAVERSE_MOBILE_V01.PNG"
alt="NovaVerse USA Mobile">

</body>

</html>
