<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaVerse USA</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

img{
    width:100vw;
    height:100vh;
    object-fit:contain;
    display:block;
}

.mobile{
    display:none;
}

@media (max-width:768px){
    .desktop{
        display:none;
    }

    .mobile{
        display:block;
    }
}
</style>
</head>

<body>

<img
    class="desktop"
    src="./NOVAVERSE_APP_HERO_BACKGROUND_V01.png"
    alt="NovaVerse Desktop">

<img
    class="mobile"
    src="./NOVAVERSE_MOBILE_V01.PNG"
    alt="NovaVerse Mobile">

</body>
</html>
