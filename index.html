<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaVerse USA</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
}

img {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  display: block;
}

.mobile {
  display: none;
}

@media screen and (max-width: 768px) {
  .desktop {
    display: none;
  }

  .mobile {
    display: block;
  }
}
</style>
</head>

<body>

<img class="desktop" src="desktop.png" alt="NovaVerse USA">
<img class="mobile" src="mobile.png" alt="NovaVerse USA Mobile">

</body>
</html>
